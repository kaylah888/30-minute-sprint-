<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Minute Sprint</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* Streak Shield */
        #shield { font-size: 80px; transition: 0.3s; margin-bottom: 10px; }
        .shield-ok { color: var(--primary); filter: drop-shadow(0 0 10px var(--primary)); }
        .shield-cracked { color: var(--danger); opacity: 0.6; }

        /* Progress Bar */
        .progress-box { background: #333; height: 25px; border-radius: 12px; margin: 20px 0; overflow: hidden; position: relative; }
        #bar { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); width: 0%; transition: width 1s ease; }
        
        /* Timer */
        #timer-display { font-size: 48px; font-weight: bold; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        /* Rewards */
        .reward-tier { background: var(--card); padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; border-left: 5px solid #555; }
        .unlocked { border-left-color: var(--primary); background: #1a2e1a; }

        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        button:disabled { background: #555; }
        .reset-btn { background: transparent; color: #555; margin-top: 30px; font-size: 12px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="shield" class="shield-ok">🛡️</div>
    <h2 id="streak-text">Day 0 / 30</h2>
    
    <div class="progress-box">
        <div id="bar"></div>
    </div>

    <div id="timer-display">30:00</div>
    <button id="mainBtn" onclick="toggleTimer()">START WORKOUT</button>

    <div id="rewards-list">
        <div class="reward-tier" id="r1"><strong>Day 7:</strong> Micro-Treat (Coffee/Movie)</div>
        <div class="reward-tier" id="r2"><strong>Day 15:</strong> Performance Gear Booster</div>
        <div class="reward-tier" id="r3"><strong>Day 30:</strong> GRAND PRIZE CLAIM</div>
    </div>

    <button class="reset-btn" onclick="resetApp()">Reset All Progress</button>
</div>

<script>
    let secondsLeft = 1800; // 30 minutes
    let timerInterval;
    let isRunning = false;

    // Load Data
    let data = JSON.parse(localStorage.getItem('sprintData')) || {
        totalDays: 0,
        lastCompleted: null,
        shieldIntact: true
    };

    function updateUI() {
        document.getElementById('streak-text').innerText = `Day ${data.totalDays} / 30`;
        document.getElementById('bar').style.width = (data.totalDays / 30 * 100) + '%';
        
        // Shield Logic
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        
        if (data.lastCompleted && data.lastCompleted !== today && data.lastCompleted !== yesterday) {
            data.shieldIntact = false;
        }

        const shield = document.getElementById('shield');
        shield.innerHTML = data.shieldIntact ? "🛡️" : "❌";
        shield.className = data.shieldIntact ? "shield-ok" : "shield-cracked";

        // Reward Unlocking
        if (data.totalDays >= 7) document.getElementById('r1').classList.add('unlocked');
        if (data.totalDays >= 15) document.getElementById('r2').classList.add('unlocked');
        if (data.totalDays >= 30) document.getElementById('r3').classList.add('unlocked');
        
        // Disable button if already done today
        if (data.lastCompleted === today) {
            document.getElementById('mainBtn').innerText = "DONE FOR TODAY!";
            document.getElementById('mainBtn').disabled = true;
        }
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            document.getElementById('mainBtn').innerText = "RESUME";
        } else {
            document.getElementById('mainBtn').innerText = "PAUSE";
            timerInterval = setInterval(() => {
                secondsLeft--;
                updateTimerDisplay();
                if (secondsLeft <= 0) completeWorkout();
            }, 1000);
        }
        isRunning = !isRunning;
    }

    function updateTimerDisplay() {
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        document.getElementById('timer-display').innerText = 
            `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function completeWorkout() {
        clearInterval(timerInterval);
        data.totalDays++;
        data.lastCompleted = new Date().toDateString();
        data.shieldIntact = true;
        localStorage.setItem('sprintData', JSON.stringify(data));
        alert("🎉 30 Minutes Done! Day Logged.");
        updateUI();
    }

    function resetApp() {
        if (confirm("Reset everything?")) {
            localStorage.clear();
            location.reload();
        }
    }

    updateUI();
</script>
</body>
</html>
